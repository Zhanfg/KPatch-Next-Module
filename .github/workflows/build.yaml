name: Build

on:
  push:
    branches: [main]
    paths-ignore: ['**.md']
  workflow_dispatch:

env:
  MODULE_NAME: 'KPatch-Next-Module'
  GH_TOKEN: ${{ github.token }}

jobs:
  test:
    name: KPM Validation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v4
      with: { node-version: 'lts/*' }
    - name: Validate test KPM files
      run: node tests/validate_kpm.js

  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check_tag.outputs.version }}
      check_tag: ${{ steps.check_tag.outputs.need_release }}
    steps:
    - uses: actions/checkout@v6
      with: { fetch-depth: 1 }

    - name: Load versions
      run: grep -v '^#' version.properties | sed -e 's/ *= */=/g' -e 's/"//g' >> $GITHUB_ENV

    # === KPatch-Next binaries → module/bin/kpatch-next/ ===
    - name: Download KPatch-Next binaries
      run: |
        mkdir -p module/bin/kpatch-next
        TAG="${{ env['kpatch-next'] }}"
        ARGS=("-R" "KernelSU-Next/KPatch-Next" "-p" "kpatch-android" "-p" "kptools-android" "-p" "kpimg-linux" "-D" "module/bin/kpatch-next")
        if [ "$TAG" != "latest" ]; then gh release download "$TAG" "${ARGS[@]}"; else gh release download "${ARGS[@]}"; fi
        mv module/bin/kpatch-next/kpatch-android module/bin/kpatch-next/kpatch
        mv module/bin/kpatch-next/kptools-android module/bin/kpatch-next/kptools
        mv module/bin/kpatch-next/kpimg-linux module/bin/kpatch-next/kpimg

    # === KernelPatch binaries → module/bin/kernelpatch/ ===
    - name: Download KernelPatch binaries
      run: |
        mkdir -p module/bin/kernelpatch
        TAG="${{ env['kernelpatch'] }}"
        ARGS=("-R" "Zhanfg/KernelPatch-Public" "-p" "kpuser.zip" "-p" "kpimg-linux" "-p" "kptools-android" "-D" "module/bin/kernelpatch")
        if [ "$TAG" != "latest" ]; then gh release download "$TAG" "${ARGS[@]}"; else gh release download "${ARGS[@]}"; fi
        cd module/bin/kernelpatch
        unzip -o kpuser.zip -d kpuser_tmp 2>/dev/null
        KPUSER=$(find kpuser_tmp -name "kpuser" -o -name "*android*" -o -name "*aarch64*" | head -1)
        [ -n "$KPUSER" ] && cp "$KPUSER" kpatch
        rm -rf kpuser_tmp kpuser.zip
        mv kptools-android kptools 2>/dev/null
        mv kpimg-linux kpimg 2>/dev/null

    # === Default active binaries (KPatch-Next) ===
    - name: Set default binaries
      run: |
        cp module/bin/kpatch-next/kpatch module/bin/kpatch
        cp module/bin/kpatch-next/kptools module/bin/kptools
        cp module/bin/kpatch-next/kpimg module/bin/kpimg

    # === Magiskboot ===
    - name: Download magiskboot
      run: |
        TAG="${{ env.magiskboot }}"
        ARGS=("-R" "topjohnwu/Magisk" "-p" "Magisk*.apk" "-O" "magisk.apk")
        if [ "$TAG" != "latest" ]; then gh release download "$TAG" "${ARGS[@]}"; else gh release download "${ARGS[@]}"; fi
        unzip -p magisk.apk 'lib/arm64-v8a/libmagiskboot.so' > module/bin/magiskboot
        rm magisk.apk

    # === WebUI ===
    - uses: pnpm/action-setup@v4
      with: { version: 'latest' }
    - uses: actions/setup-node@v4
      with: { node-version: 'latest', cache: pnpm, cache-dependency-path: webui/pnpm-lock.yaml }
    - name: Build WebUI
      run: cd webui && pnpm install --frozen-lockfile && pnpm build

    - uses: actions/upload-artifact@v6
      with:
        name: ${{ env.MODULE_NAME }}-${{ github.run_number }}
        path: module

    - name: Check if valid to release
      id: check_tag
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "need_release=false" >> $GITHUB_OUTPUT
        else
          git fetch --tags
          VERSION="$(jq -r .version update.json)"
          if [ -z "$VERSION" ]; then
            echo "need_release=false" >> $GITHUB_OUTPUT
          elif git tag -l "$VERSION" | grep -q .; then
            echo "need_release=false" >> $GITHUB_OUTPUT
          else
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "need_release=true" >> $GITHUB_OUTPUT
          fi
        fi

  release:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.check_tag == 'true'
    steps:
    - uses: actions/checkout@v6
      with: { fetch-depth: 2 }
    - uses: actions/download-artifact@v7
      with:
        name: ${{ env.MODULE_NAME }}-${{ github.run_number }}
        path: ${{ env.MODULE_NAME }}
    - run: cd ${{ env.MODULE_NAME }} && zip -r ../${{ env.MODULE_NAME }}.zip .
    - name: Generate changelog
      run: |
        CHANGELOG_RAW=$(git diff HEAD^ HEAD -- "CHANGELOG.md" | grep '^+[^+]' | sed 's/^+//')
        { echo "CHANGELOG<<EOF"; echo -e "${CHANGELOG_RAW}"; echo "EOF"; } >> $GITHUB_ENV
    - uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.build.outputs.version }}
        name: ${{ needs.build.outputs.version }}
        body: ${{ env.CHANGELOG }}
        files: ${{ env.MODULE_NAME }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
